name: Run DB seed

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate environment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "import sys, os; print(sys.version); print('DATABASE_URL:', bool(os.environ.get('DATABASE_URL'))); print('PWD:', os.getcwd())"
          python -c "from app.config import get_settings; s = get_settings(); print('settings db ok:', s.DATABASE_URL.startswith('postgresql'))"
      - name: Run seed script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python seed.py
